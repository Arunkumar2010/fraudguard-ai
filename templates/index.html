{% extends "base.html" %}
{% block title %}Home{% endblock %}
{% block content %}
<div class="card">
    <h1>Transaction Fraud Analysis</h1>
    <p>Enter the transaction details below to predict the likelihood of fraud using our Hybrid AI Model (Autoencoder + XGBoost + RF).</p>
    
    <form action="/predict" method="POST" style="margin-top: 2rem;">
        <div class="grid-form">
            <div class="form-group">
                <label for="Time">Time (seconds since first transaction)</label>
                <input type="number" step="any" name="Time" value="0.0" required>
            </div>
            <div class="form-group">
                <label for="Amount">Amount</label>
                <input type="number" step="any" name="Amount" value="10.0" required>
            </div>
            {% for i in range(1, 29) %}
            <div class="form-group">
                <label for="V{{ i }}">V{{ i }}</label>
                <input type="number" step="any" name="V{{ i }}" value="0.0" required>
            </div>
            {% endfor %}
        </div>
        <div style="margin-top: 2rem; text-align: center;">
            <button type="submit" class="btn">Analyze Transaction</button>
        </div>
    </form>
</div>
{% endblock %}
