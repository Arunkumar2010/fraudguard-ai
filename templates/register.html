<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FraudGuard AI | Register</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-bottom: #1a0533;
            --bg-mid: #4a1470;
            --bg-top: #6b21a8;
            --mountain1: #7c3aed;
            --mountain2: #6d28d9;
            --mountain3: #4c1d95;
            --sun: #fef3c7;
            --foreground: #1e0a3c;
            --white: rgba(255, 255, 255, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            height: 100vh;
            width: 100vw;
            background: linear-gradient(to top, var(--bg-bottom), var(--bg-mid), var(--bg-top));
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Illustrative Nature Scene Background */
        .scene {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .sun {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, white, var(--sun));
            border-radius: 50%;
            box-shadow: 0 0 60px rgba(254, 243, 199, 0.4);
        }

        .mountain {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 40%;
            clip-path: polygon(0% 100%, 15% 40%, 30% 70%, 50% 10%, 70% 60%, 85% 30%, 100% 100%);
        }

        .mountain-3 { background-color: var(--mountain3); height: 50%; z-index: 2; opacity: 0.8;}
        .mountain-2 { background-color: var(--mountain2); height: 40%; z-index: 3; opacity: 0.9; clip-path: polygon(0% 100%, 20% 50%, 40% 80%, 60% 30%, 80% 60%, 100% 100%); }
        .mountain-1 { background-color: var(--mountain1); height: 30%; z-index: 4; clip-path: polygon(0% 100%, 10% 60%, 25% 40%, 45% 70%, 65% 50%, 85% 80%, 100% 100%); }

        .foreground-leaves {
            position: absolute;
            bottom: -20px;
            width: 100%;
            height: 150px;
            background-color: var(--foreground);
            z-index: 5;
            mask-image: linear-gradient(to top, black 50%, transparent);
            -webkit-mask-image: linear-gradient(to top, black 50%, transparent);
        }

        /* Navbar */
        .navbar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 50px;
            z-index: 20;
        }

        .logo { color: white; font-weight: 700; font-size: 20px; text-decoration: none; }
        
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { color: white; text-decoration: none; font-size: 14px; opacity: 0.8; transition: opacity 0.2s; }
        .nav-links a:hover { opacity: 1; }

        .login-nav-btn {
            border: 1px solid white;
            color: white;
            text-decoration: none;
            padding: 6px 18px;
            border-radius: 6px;
            font-size: 14px;
            transition: background 0.2s, color 0.2s;
        }
        .login-nav-btn:hover { background: white; color: var(--bg-mid); }

        /* Card Overlay Fixes */
        .card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 36px 32px;
            width: 360px;
            z-index: 30;
            position: relative;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .close-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            color: white;
            cursor: pointer;
            opacity: 0.6;
        }

        h2 {
            color: white;
            font-size: 22px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 30px;
        }

        ::placeholder { color: rgba(255, 255, 255, 0.5); }
    </style>
</head>
<body>
    <!-- Background Scene -->
    <div class="scene">
        <div class="sun"></div>
        <div class="mountain mountain-3"></div>
        <div class="mountain mountain-2"></div>
        <div class="mountain mountain-1"></div>
        <div class="foreground-leaves"></div>
    </div>

    <!-- Navbar -->
    <nav class="navbar">
        <a href="/home" class="logo">FraudGuard AI</a>
        <div class="nav-links">
            <a href="/home">Home</a>
            <a href="/home#features">Features</a>
            <a href="/home">Contact</a>
            <a href="/home">About</a>
        </div>
        <a href="/login" class="login-nav-btn">Login</a>
    </nav>

    <!-- Modal Card -->
    <div class="card">
        <div class="close-btn" onclick="window.location.href='/home'">
            <i data-lucide="x" size="20"></i>
        </div>
        
        <h2>Registration</h2>
        
        <form action="/register" method="POST">
            <!-- Full Name -->
            <div style="position:relative; margin-bottom: 20px;">
                <input 
                  type="text" 
                  name="name"
                  placeholder="Full Name"
                  required
                  style="
                    width: 100%;
                    background: rgba(255,255,255,0.15);
                    border: none;
                    border-bottom: 1.5px solid rgba(255,255,255,0.4);
                    color: white;
                    font-size: 14px;
                    padding: 10px 36px 10px 4px;
                    outline: none;
                    border-radius: 0;
                  "
                />
                <span style="
                  position: absolute;
                  right: 8px;
                  top: 50%;
                  transform: translateY(-50%);
                  color: rgba(255,255,255,0.6);
                  font-size: 16px;
                ">&#128100;</span>
            </div>

            <!-- Email -->
            <div style="position:relative; margin-bottom: 20px;">
                <input 
                  type="email" 
                  name="email"
                  placeholder="Email Address"
                  required
                  style="
                    width: 100%;
                    background: rgba(255,255,255,0.15);
                    border: none;
                    border-bottom: 1.5px solid rgba(255,255,255,0.4);
                    color: white;
                    font-size: 14px;
                    padding: 10px 36px 10px 4px;
                    outline: none;
                    border-radius: 0;
                  "
                />
                <span style="
                  position: absolute;
                  right: 8px;
                  top: 50%;
                  transform: translateY(-50%);
                  color: rgba(255,255,255,0.6);
                  font-size: 16px;
                ">&#9993;</span>
            </div>

            <!-- Password -->
            <div style="position:relative; margin-bottom: 20px;">
                <input 
                  type="password" 
                  name="password"
                  placeholder="Password"
                  required
                  style="
                    width: 100%;
                    background: rgba(255,255,255,0.15);
                    border: none;
                    border-bottom: 1.5px solid rgba(255,255,255,0.4);
                    color: white;
                    font-size: 14px;
                    padding: 10px 36px 10px 4px;
                    outline: none;
                    border-radius: 0;
                  "
                />
                <span style="
                  position: absolute;
                  right: 8px;
                  top: 50%;
                  transform: translateY(-50%);
                  color: rgba(255,255,255,0.6);
                  font-size: 16px;
                ">&#128274;</span>
            </div>
            
            <!-- Checkbox row -->
            <div style="display:flex; align-items:center; gap:8px; margin-bottom:20px;">
                <input type="checkbox" id="terms" required 
                  style="width:14px; height:14px; cursor:pointer;"/>
                <label for="terms" 
                  style="color:rgba(255,255,255,0.7); font-size:12px; cursor:pointer;">
                  I agree to the terms & conditions
                </label>
            </div>
            
            <!-- Register button -->
            <button type="submit" style="
                background: linear-gradient(135deg, #7c3aed, #4c1d95);
                color: white; width: 100%; padding: 12px;
                border: none; border-radius: 8px; 
                font-size: 14px; font-weight: 600; cursor: pointer;
                transition: opacity 0.2s;"
                onmouseover="this.style.opacity='0.9'" 
                onmouseout="this.style.opacity='1'">
                Register
            </button>
        </form>

        <div style="color: rgba(255,255,255,0.6); font-size: 13px; text-align:center; margin-top:20px;">
            Already have account? <a href="/login" style="color: white; font-weight: 600; text-decoration: none;">Login</a>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
